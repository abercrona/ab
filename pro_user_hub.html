<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Навигация по разделам — каталог вверх</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    /* новая цветовая схема: серый фон, как во втором примере */
    background: #535353;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1rem;
}

h1 {
    font-size: 1.3rem;
    font-weight: 600;
    background: linear-gradient(120deg,#ffffff,#b9f3ff);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 1rem;
}

.buttons-grid {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
}

/* Обычные кнопки — новый цвет фона и границ (как в эталонном хабе) */
.nav-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #474747;
    padding: 0.5rem 1rem;
    border-radius: 0.7rem;
    text-decoration: none;
    color: #f0f4fa;
    font-weight: 500;
    font-size: 0.8rem;
    transition: all 0.25s ease;
    border: 1px solid #404040;
}

.btn-left {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex: 1;
}

.btn-left i {
    font-size: 0.9rem;
    width: 20px;
    color: #7bc5ff;
}

.arrow {
    font-size: 0.8rem;
    opacity: 0.8;
    transition: transform 0.2s;
    margin-left: 8px;
    color: #b0c4de;
}

.nav-btn:hover {
    background: #ffb347;
    border-color: #ffcc88;
    transform: translateX(3px);
    color: #0f1722;
}

.nav-btn:hover i {
    color: #0f1722;
}

.nav-btn:hover .arrow {
    transform: translateX(3px);
    color: #1e2a2f;
}

/* Группа каталога — стили аналогичны переделанному хабу */
.catalog-group {
    background: rgba(71, 71, 71, 0.45);
    border-radius: 0.9rem;
    padding: 0.4rem 0.4rem 0.5rem 0.4rem;
    border-left: 3px solid #ffb347;
    transition: all 0.2s ease;
    margin-bottom: 0.1rem;
}

.group-label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #ffb347;              /* оранжевая метка */
    margin-bottom: 0.4rem;
    margin-left: 0.5rem;
    text-align: left;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 4px;
}

/* Кнопки одинаковой ширины внутри группы */
.group-buttons {
    display: flex;
    gap: 0.5rem;
    width: 100%;
}

.group-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #474747;
    padding: 0.5rem 0.8rem;
    border-radius: 0.7rem;
    text-decoration: none;
    color: #f0f4fa;
    font-weight: 500;
    font-size: 0.75rem;
    border: 1px solid #404040;
    transition: all 0.25s ease;
}

.group-btn .btn-left {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.group-btn i {
    font-size: 0.85rem;
    width: 22px;
    color: #7bc5ff;
}

.group-arrow {
    font-size: 0.75rem;
    opacity: 0.8;
    transition: transform 0.2s;
    color: #b0c4de;
}

.group-btn:hover {
    background: #ffb347;
    border-color: #ffcc88;
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    color: #0f1722;
}

.group-btn:hover i {
    color: #0f1722;
}

.group-btn:hover .group-arrow {
    transform: translateX(3px);
    color: #1e2a2f;
}

/* Мобильная адаптация (сохранена из оригинала, но с новыми цветами) */
@media (max-width:550px) {
    .menu-container {
        padding: 0.9rem;
    }
    
    .nav-btn, .group-btn {
        padding: 0.45rem 0.8rem;
        font-size: 0.7rem;
    }
    
    .group-buttons {
        flex-direction: column;
        gap: 0.5rem;
    }
    
    .btn-left i, .group-btn i {
        font-size: 0.8rem;
        width: 18px;
    }

    .catalog-group {
        padding: 0.5rem;
    }
}
</style>
</head>
<body>

<div class="menu-container">
    
    <div class="buttons-grid">
        
        <!-- БЛОК КАТАЛОГА — НА ВЕРХУ! (содержимое не изменено, только цвета) -->
        <div class="catalog-group">
            <div class="group-label">📁 КАТАЛОГ ОТЧЕТОВ</div>
            <div class="group-buttons">
                <!-- ИНСТРУКЦИЯ ПЕРВАЯ -->
                <a href="#" target="_blank" class="group-btn" id="instruction-link">
                    <div class="btn-left">
                        <i class="fas fa-info-circle"></i>
                        <span>Инструкция по каталогу</span>
                    </div>
                    <span class="group-arrow">→</span>
                </a>
                <!-- КАТАЛОГ ВТОРОЙ -->
                <a href="#" target="_blank" class="group-btn" id="catalog-link">
                    <div class="btn-left">
                        <i class="fas fa-search"></i>
                        <span>Каталог. Поиск отчётов</span>
                    </div>
                    <span class="group-arrow">→</span>
                </a>
            </div>
        </div>
        
        <!-- Остальные кнопки (все ссылки сохранены) -->
        <a href="#" target="_blank" class="nav-btn" id="faq-link">
            <div class="btn-left">
                <i class="fas fa-question-circle"></i>
                <span>FAQ</span>
            </div>
            <span class="arrow">→</span>
        </a>
        
        <a href="#" target="_blank" class="nav-btn" id="rules-link">
            <div class="btn-left">
                <i class="fas fa-gavel"></i>
                <span>Правила работы и разработки</span>
            </div>
            <span class="arrow">→</span>
        </a>
        
        <a href="#" target="_blank" class="nav-btn" id="trainings-link">
            <div class="btn-left">
                <i class="fas fa-chalkboard-user"></i>
                <span>Тренинги</span>
            </div>
            <span class="arrow">→</span>
        </a>
        
        <a href="#" target="_blank" class="nav-btn" id="instructions-link">
            <div class="btn-left">
                <i class="fas fa-book-open"></i>
                <span>Инструкции по разработке</span>
            </div>
            <span class="arrow">→</span>
        </a>
        
        <a href="#" target="_blank" class="nav-btn" id="videos-link">
            <div class="btn-left">
                <i class="fas fa-video"></i>
                <span>Видео встреч комьюнити</span>
            </div>
            <span class="arrow">→</span>
        </a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>
<script>
    // Оригинальные ссылки — без изменений
    document.getElementById('faq-link').href = "https://disk.yandex.ru/i/WtQ176P4t6ro0A";
    document.getElementById('rules-link').href = "https://disk.yandex.ru/d/7phBHCSejkhw4Q";
    document.getElementById('trainings-link').href = "https://disk.yandex.ru/d/aWKAnfdmj4UkFQ";
    document.getElementById('instructions-link').href = "https://disk.yandex.ru/d/kcFCSE79neHc1w";
    document.getElementById('videos-link').href = "https://disk.yandex.ru/d/nOLF50xw41J1gg";
    document.getElementById('catalog-link').href = "http://10.179.161.135:8585/";
    document.getElementById('instruction-link').href = "https://disk.yandex.ru/i/1mhl7_lX-F9GGw";
</script>
</body>
</html>

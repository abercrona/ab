<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигация по разделам — выделенный каталог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .menu-container {
            max-width: 500px;
            width: 100%;
            background: #0a0a1a;
            border-radius: 1.2rem;
            padding: 1.2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h1 {
            font-size: 1.3rem;
            font-weight: 600;
            background: linear-gradient(120deg, #ffffff, #b9f3ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.8rem;
        }

        .sub {
            color: #8e9cb0;
            margin-bottom: 1rem;
            font-size: 0.7rem;
        }

        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        /* Обычная кнопка — сплошной цвет, как в исходном первом блоке */
        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e2a3a;
            padding: 0.5rem 1rem;
            border-radius: 0.7rem;
            text-decoration: none;
            color: #f0f4fa;
            font-weight: 500;
            font-size: 0.8rem;
            transition: all 0.25s ease;
            border: 1px solid #2d3e50;
            cursor: pointer;
            text-align: left;
        }

        .btn-left {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            text-align: left;
            flex: 1;
        }

        .btn-left span {
            text-align: left;
            line-height: 1.3;
        }

        .btn-left i {
            font-size: 0.9rem;
            width: 22px;
            color: #7bc5ff;
            flex-shrink: 0;
        }

        .arrow {
            font-size: 0.8rem;
            opacity: 0.8;
            transition: transform 0.2s;
            flex-shrink: 0;
            margin-left: 8px;
            color: #b0c4de;
        }

        .nav-btn:hover {
            background: #ffb347;
            border-color: #ffcc88;
            transform: translateX(3px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            color: #0f1722;
        }

        .nav-btn:hover .btn-left i {
            color: #0f1722;
        }

        .nav-btn:hover .arrow {
            transform: translateX(3px);
            opacity: 1;
            color: #1e2a2f;
        }

        /* ===== ВЫДЕЛЕННЫЙ БЛОК КАТАЛОГА ===== */
        .catalog-group {
            background: rgba(30, 42, 58, 0.45);
            border-radius: 0.9rem;
            padding: 0.4rem 0.4rem 0.5rem 0.4rem;
            border-left: 3px solid #ffb347;
            transition: all 0.2s ease;
            margin-bottom: 0.1rem;
        }

        .group-label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #ffb347;
            margin-bottom: 0.4rem;
            margin-left: 0.5rem;
            text-align: left;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .group-label i {
            font-size: 0.6rem;
            color: #ffb347;
        }

        /* Контейнер для двух кнопок */
        .group-buttons {
            display: flex;
            gap: 0.5rem;
            width: 100%;
        }

        /* Кнопки внутри группы */
        .group-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e2a3a;
            padding: 0.5rem 0.8rem;
            border-radius: 0.7rem;
            text-decoration: none;
            color: #f0f4fa;
            font-weight: 500;
            font-size: 0.75rem;
            transition: all 0.25s ease;
            border: 1px solid #3a4c62;
            cursor: pointer;
            gap: 0.5rem;
        }

        .group-btn .btn-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
        }

        .group-btn i {
            font-size: 0.85rem;
            width: 22px;
            color: #7bc5ff;
            flex-shrink: 0;
        }

        .group-arrow {
            font-size: 0.75rem;
            opacity: 0.8;
            transition: transform 0.2s;
            flex-shrink: 0;
            color: #b0c4de;
        }

        .group-btn:hover {
            background: #ffb347;
            border-color: #ffcc88;
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            color: #0f1722;
        }

        .group-btn:hover i {
            color: #0f1722;
        }

        .group-btn:hover .group-arrow {
            transform: translateX(3px);
            opacity: 1;
            color: #1e2a2f;
        }

        .footer-note {
            margin-top: 0.8rem;
            font-size: 0.55rem;
            color: #5a6e85;
        }

        /* Адаптивность */
        @media (max-width: 550px) {
            .menu-container {
                padding: 1rem;
            }
            .nav-btn, .group-btn {
                padding: 0.45rem 0.8rem;
                font-size: 0.7rem;
            }
            .btn-left, .group-btn .btn-left {
                gap: 0.5rem;
            }
            .btn-left i, .group-btn i {
                font-size: 0.8rem;
                width: 20px;
            }
            h1 {
                font-size: 1.2rem;
            }
            .arrow, .group-arrow {
                font-size: 0.7rem;
            }
            .group-buttons {
                gap: 0.4rem;
            }
        }

        @media (max-width: 480px) {
            .group-buttons {
                flex-direction: column;
                gap: 0.5rem;
            }
            .catalog-group {
                padding: 0.5rem;
            }
            .btn-left span, .group-btn .btn-left span {
                white-space: normal;
                word-break: break-word;
            }
        }

        .nav-btn, .btn-left, .btn-left span, .group-btn, .group-btn .btn-left {
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="menu-container">

        <div class="buttons-grid">
            <!-- ВЫДЕЛЕННЫЙ БЛОК КАТАЛОГА НАВЕРХУ -->
            <div class="catalog-group">
                <div class="group-label">
                    <i class="fas fa-folder-open"></i>
                    <span>КАТАЛОГ ОТЧЁТОВ</span>
                </div>
                <div class="group-buttons">
                    <a href="#" target="_blank" class="group-btn" id="instruction-link">
                        <div class="btn-left">
                            <i class="fas fa-info-circle"></i>
                            <span>Инструкция по каталогу</span>
                        </div>
                        <span class="group-arrow">→</span>
                    </a>
                    <a href="#" target="_blank" class="group-btn" id="catalog-link">
                        <div class="btn-left">
                            <i class="fas fa-search"></i>
                            <span>Каталог. Поиск отчётов</span>
                        </div>
                        <span class="group-arrow">→</span>
                    </a>
                </div>
            </div>

            <!-- КНОПКА 1: FAQ -->
            <a href="#" target="_blank" class="nav-btn" id="faq-link">
                <div class="btn-left">
                    <i class="fas fa-question-circle"></i>
                    <span>Ответы на частые вопросы</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <!-- КНОПКА 2: Тренинги -->
            <a href="#" target="_blank" class="nav-btn" id="trainings-link">
                <div class="btn-left">
                    <i class="fas fa-chalkboard-user"></i>
                    <span>Как использовать Дельта BI</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <!-- КНОПКА 3: Запрос доступа -->
            <a href="#" target="_blank" class="nav-btn" id="access-link">
                <div class="btn-left">
                    <i class="fas fa-key"></i>
                    <span>Запрос доступа к отчётам</span>
                </div>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/js/all.min.js"></script>

    <script>
        document.getElementById('faq-link').href = "https://disk.yandex.ru/i/XTMscW8SqARh2Q";
        document.getElementById('trainings-link').href = "https://disk.yandex.ru/d/YzsDEnbyIRhjWA";
        document.getElementById('instruction-link').href = "https://disk.yandex.ru/i/1mhl7_lX-F9GGw";
        document.getElementById('catalog-link').href = "http://10.179.161.135:8585/";
        document.getElementById('access-link').href = "https://knowledge.our-intranet.ru/ru/group/obshchiy-sayt/content-view/-/kb_asset_publisher/contentView/content/id/5034274";
    </script>
</body>
</html>

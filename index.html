<!DOCTYPE html>
<html>
<head>
    <title>Моя кнопка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
            background: #f5f5f5;
        }
        .knopka {
            display: inline-block;
            padding: 25px 60px;
            font-size: 28px;
            background: #FF5722;
            color: white;
            text-decoration: none;
            border-radius: 15px;
            margin: 30px;
            box-shadow: 0 5px 15px rgba(255, 87, 34, 0.4);
        }
        .knopka:hover {
            background: #E64A19;
            transform: scale(1.05);
        }
        .instrukciya {
            color: #666;
            margin-top: 50px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h1>✨ Нажми на кнопку ниже! ✨</h1>
    <p>Откроется нужный сайт</p>
    
    <!-- ⚠️ ВАЖНО: ЗАМЕНИТЕ ССЫЛКУ НИЖЕ НА СВОЮ ⚠️ -->
    <a class="knopka" href="https://www.youtube.com" target="_blank">
        НАЖМИ МЕНЯ
    </a>
    
    <div class="instrukciya">
        <h3>Как поменять ссылку:</h3>
        <p>1. Нажмите на карандаш ✏️ сверху в этом файле</p>
        <p>2. Найдите строку: <code>https://www.youtube.com</code></p>
        <p>3. Замените на свою ссылку</p>
        <p>4. Нажмите "Commit changes" внизу</p>
    </div>
</body>
</html>

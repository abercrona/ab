<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дельта BI: Ваш отзыв важен!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #f5f5f5;
            color: #333;
        }
        h2 {
            margin-bottom: 15px; /* меньше расстояние до кнопки */
        }
        .button {
            display: inline-block;
            padding: 18px 45px;
            font-size: 22px;
            background: #FF5722;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            margin: 10px 0; /* меньше расстояние до текста */
            box-shadow: 0 4px 12px rgba(255,87,34,0.4);
            transition: transform 0.2s, background 0.2s;
        }
        .button:hover {
            background: #E64A19;
            transform: scale(1.05);
        }
        .message {
            font-size: 16px;
            margin-top: 15px; /* меньше отступ сверху */
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h2>✨ Поделитесь своим мнением! ✨</h2>

    <!-- Кнопка для опроса -->
    <a class="button" href="https://forms.yandex.ru/cloud/687f8de690fa7b0a764e20d4/" target="_blank">
        Пройти опрос
    </a>
    
    <p class="message">
        Дорогой коллега,<br>
        Каждый день наша команда работает над тем, чтобы Дельта BI был удобным и полезным инструментом для вашей работы.<br>
        Ваш отзыв поможет нам развивать систему так, чтобы она приносила максимум пользы и радости в работе.  
    </p>

</body>
</html>
